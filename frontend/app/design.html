<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetFlow | Authentication</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="big-circle"></div>

        <div class="left-content">

            <h1>Welcome<br>to AssetFlow</h1>

            <p>
                Track, manage and monitor your
                organizational assets with ease.
            </p>

            <button id="left-btn" class="switch-btn">
                Sign In
            </button>

        </div>

    </div>



    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <!-- LOGIN FORM -->

        <div class="form-container login active">

            <h2>Login</h2>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text"
                placeholder="Username">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password"
                placeholder="Password">
            </div>

            <a href="#" class="forgot">
                Forgot Password?
            </a>

            <button class="main-btn">
                Login
            </button>

           <p class="toggle-text">
                Don't have an account?
                <a href="signup.html" class="toggle-link">Sign Up</a>
            </p>

        </div>



        <!-- SIGNUP FORM -->

        <div class="form-container signup">

            <h2>Create Account</h2>

            <div class="input-box">
                <i class="fa-solid fa-user"></i>
                <input type="text"
                placeholder="Full Name">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>
                <input type="email"
                placeholder="Email Address">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-user-tag"></i>
                <input type="text"
                placeholder="Username">
            </div>

            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password"
                placeholder="Password">
            </div>

            <button class="main-btn">
                Create Account
            </button>

            <p class="toggle-text">

                Already have an account?

                <span id="showLogin">
                    Sign In
                </span>

            </p>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
