version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assetflow
    ports:
      - "5432:5432"
    volumes:
      - assetflow_pgdata:/var/lib/postgresql/data

volumes:
  assetflow_pgdata:
